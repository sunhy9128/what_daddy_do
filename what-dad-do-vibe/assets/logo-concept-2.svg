<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF5F0"/>
      <stop offset="100%" stop-color="#F0EBE3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bgGrad2)"/>

  <!-- Abstract baby + father symbol -->
  <g transform="translate(512, 460)">
    <!-- Large heart shape -->
    <path d="M0 -120 C-80 -200 -200 -120 -200 20 C-200 160 0 280 0 280 C0 280 200 160 200 20 C200 -120 80 -200 0 -120"
          fill="#2C3E6B"/>

    <!-- Smaller heart overlay (baby) -->
    <path d="M0 -60 C-40 -110 -100 -70 -100 10 C-100 90 0 160 0 160 C0 160 100 90 100 10 C100 -70 40 -110 0 -60"
          fill="#FAF5F0"/>

    <!-- Inner heart (core) -->
    <path d="M0 -20 C-20 -55 -50 -35 -50 10 C-50 55 0 100 0 100 C0 100 50 55 50 10 C50 -35 20 -55 0 -20"
          fill="#E85D75"/>
  </g>

  <!-- Text -->
  <text x="512" y="780" font-family="system-ui, -apple-system, sans-serif"
        font-size="180" font-weight="700" fill="#2C3E6B"
        text-anchor="middle">爸爸去哪了</text>
</svg>