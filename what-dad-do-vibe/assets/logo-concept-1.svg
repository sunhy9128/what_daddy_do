<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF5F0"/>
      <stop offset="100%" stop-color="#F0EBE3"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C3E6B"/>
      <stop offset="100%" stop-color="#1A2745"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bgGrad)"/>

  <!-- Father holding baby icon -->
  <g transform="translate(512, 480)">
    <!-- Baby silhouette (simplified, cute) -->
    <ellipse cx="0" cy="-80" rx="120" ry="100" fill="#2C3E6B"/>
    <!-- Baby face highlight -->
    <ellipse cx="0" cy="-85" rx="90" ry="75" fill="#3D5380"/>

    <!-- Father hand curves from sides -->
    <path d="M-180 60 Q-160 -20 -80 -60 Q-40 -80 0 -80 Q40 -80 80 -60 Q160 -20 180 60"
          fill="none" stroke="#2C3E6B" stroke-width="50" stroke-linecap="round"/>

    <!-- Heart in center (represents love/care) -->
    <path d="M0 20 C-30 -20 -70 -30 -70 10 C-70 50 0 90 0 90 C0 90 70 50 70 10 C70 -30 30 -20 0 20"
          fill="#E85D75"/>
    <path d="M0 25 C-22 -5 -55 -15 -55 15 C-55 45 0 78 0 78 C0 78 55 45 55 15 C55 -15 22 -5 0 25"
          fill="#FA8090"/>
  </g>

  <!-- Text: 爸 below icon -->
  <text x="512" y="750" font-family="system-ui, -apple-system, sans-serif"
        font-size="200" font-weight="700" fill="#2C3E6B"
        text-anchor="middle">爸</text>
</svg>