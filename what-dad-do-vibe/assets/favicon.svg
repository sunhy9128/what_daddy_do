<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="#1A1A2E">
  <!-- 背景圆 -->
  <rect width="1024" height="1024" rx="228" fill="#FAF5F0"/>
  
  <!-- 爸爸身体 - 极简剪影 -->
  <g transform="translate(512, 540)">
    <!-- 头 -->
    <circle cx="0" cy="-188" r="52" fill="#1A1A2E"/>
    
    <!-- 躯干 -->
    <path d="M-28,-140 L28,-140 L34,-30 L-34,-30 Z" fill="#1A1A2E"/>
    
    <!-- 左臂 - 向上举起 -->
    <path d="M-28,-120 C-60,-130 -90,-180 -80,-240 C-76,-258 -60,-260 -54,-246 C-48,-228 -42,-180 -24,-140 Z" fill="#1A1A2E"/>
    
    <!-- 右臂 - 向上举起 -->
    <path d="M28,-120 C60,-130 90,-180 80,-240 C76,-258 60,-260 54,-246 C48,-228 42,-180 24,-140 Z" fill="#1A1A2E"/>
    
    <!-- 左手掌（托举） -->
    <ellipse cx="-72" cy="-250" rx="16" ry="8" fill="#1A1A2E"/>
    
    <!-- 右手掌（托举） -->
    <ellipse cx="72" cy="-250" rx="16" ry="8" fill="#1A1A2E"/>
    
    <!-- 宝宝身体 - 被举起在头顶上方 -->
    <g transform="translate(0, -320)">
      <!-- 宝宝身体/衣服 -->
      <ellipse cx="0" cy="0" rx="30" ry="24" fill="#1A1A2E"/>
      
      <!-- 宝宝头 -->
      <circle cx="0" cy="-30" r="22" fill="#1A1A2E"/>
      
      <!-- 宝宝伸出的手臂（开心举起） -->
      <path d="M-18,-8 C-38,-12 -48,-28 -42,-38 C-38,-44 -28,-38 -22,-22 Z" fill="#1A1A2E"/>
      <path d="M18,-8 C38,-12 48,-28 42,-38 C38,-44 28,-38 22,-22 Z" fill="#1A1A2E"/>
      
      <!-- 宝宝脚 -->
      <ellipse cx="-14" cy="20" rx="10" ry="6" fill="#1A1A2E"/>
      <ellipse cx="14" cy="20" rx="10" ry="6" fill="#1A1A2E"/>
    </g>
    
    <!-- 腿 -->
    <path d="M-18,-30 L-22,80 L-10,80 L-8,-30 Z" fill="#1A1A2E"/>
    <path d="M18,-30 L22,80 L10,80 L8,-30 Z" fill="#1A1A2E"/>
    
    <!-- 脚 -->
    <ellipse cx="-20" cy="82" rx="16" ry="6" fill="#1A1A2E"/>
    <ellipse cx="20" cy="82" rx="16" ry="6" fill="#1A1A2E"/>
  </g>
</svg>
