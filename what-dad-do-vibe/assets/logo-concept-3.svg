<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FAF5F0"/>
      <stop offset="100%" stop-color="#F0EBE3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="200" fill="url(#bgGrad3)"/>

  <!-- Calendar/timeline icon with heart -->
  <g transform="translate(512, 420)">
    <!-- Calendar shape -->
    <rect x="-160" y="-100" width="320" height="280" rx="30" fill="#2C3E6B"/>

    <!-- Calendar top bar -->
    <rect x="-160" y="-100" width="320" height="60" rx="30" fill="#1A2745"/>
    <rect x="-160" y="-55" width="320" height="20" fill="#1A2745"/>

    <!-- Calendar rings -->
    <rect x="-80" y="-130" width="30" height="60" rx="8" fill="#FAF5F0"/>
    <rect x="50" y="-130" width="30" height="60" rx="8" fill="#FAF5F0"/>

    <!-- Heart badge (replacing calendar date) -->
    <circle cx="0" cy="80" r="80" fill="#E85D75"/>
    <path d="M0 50 C-20 20 -45 25 -45 55 C-45 85 0 110 0 110 C0 110 45 85 45 55 C45 25 20 20 0 50"
          fill="#FAF5F0"/>

    <!-- Checkmark in heart -->
    <path d="M-25 60 L-5 80 L35 40" fill="none" stroke="#E85D75" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <text x="512" y="800" font-family="system-ui, -apple-system, sans-serif"
        font-size="160" font-weight="700" fill="#2C3E6B"
        text-anchor="middle">爸爸去哪了</text>
</svg>