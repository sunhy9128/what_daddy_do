<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爸爸去哪了 - Logo设计预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #FAF5F0 0%, #F5EDE5 100%);
      min-height: 100vh;
      padding: 40px;
    }
    h1 {
      text-align: center;
      color: #2D5A7B;
      font-size: 28px;
      margin-bottom: 40px;
    }
    .preview-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .preview-item {
      background: white;
      border-radius: 24px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(45, 90, 123, 0.1);
    }
    .preview-item h3 {
      color: #2D5A7B;
      margin-bottom: 16px;
      font-size: 16px;
    }
    .size-tag {
      background: #5BA3C6;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      margin-top: 12px;
      display: inline-block;
    }
    .color-palette {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
    }
    .color-swatch {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <h1>🎨 爸爸去哪了 App Logo 设计预览</h1>

  <div class="preview-container">

    <!-- App Icon 1024x1024 -->
    <div class="preview-item">
      <h3>应用图标</h3>
      <svg width="256" height="256" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="1024" height="1024" rx="204.8" fill="#FAF5F0"/>
        <circle cx="420" cy="512" r="280" fill="#2D5A7B"/>
        <circle cx="640" cy="560" r="160" fill="#E8A87C"/>
        <circle cx="420" cy="380" r="90" fill="#FAF5F0"/>
        <circle cx="640" cy="470" r="60" fill="#FAF5F0"/>
        <path d="M512 680 Q512 720 540 740 Q568 720 568 680 Q568 640 540 660 Q512 640 512 680" fill="#5BA3C6" opacity="0.6"/>
        <path d="M700 340 L710 360 L730 365 L715 380 L720 400 L700 390 L680 400 L685 380 L670 365 L690 360 Z" fill="#E8A87C" opacity="0.8"/>
      </svg>
      <span class="size-tag">1024 × 1024</span>
    </div>

    <!-- Android Adaptive Icon -->
    <div class="preview-item">
      <h3>Android 自适应图标</h3>
      <svg width="256" height="256" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="1024" height="1024" rx="204.8" fill="#FAF5F0"/>
        <circle cx="420" cy="512" r="280" fill="#2D5A7B"/>
        <circle cx="640" cy="560" r="160" fill="#E8A87C"/>
        <circle cx="420" cy="380" r="90" fill="#FAF5F0"/>
        <circle cx="640" cy="470" r="60" fill="#FAF5F0"/>
        <path d="M512 680 Q512 720 540 740 Q568 720 568 680 Q568 640 540 660 Q512 640 512 680" fill="#5BA3C6" opacity="0.6"/>
        <path d="M700 340 L710 360 L730 365 L715 380 L720 400 L700 390 L680 400 L685 380 L670 365 L690 360 Z" fill="#E8A87C" opacity="0.8"/>
      </svg>
      <span class="size-tag">1024 × 1024</span>
    </div>

    <!-- Favicon 48x48 -->
    <div class="preview-item">
      <h3>Favicon</h3>
      <svg width="96" height="96" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="9.6" fill="#FAF5F0"/>
        <circle cx="20" cy="24" r="13" fill="#2D5A7B"/>
        <circle cx="30" cy="26" r="7.5" fill="#E8A87C"/>
        <circle cx="20" cy="18" r="4.2" fill="#FAF5F0"/>
        <circle cx="30" cy="22" r="2.8" fill="#FAF5F0"/>
      </svg>
      <span class="size-tag">48 × 48</span>
    </div>

    <!-- Splash Icon -->
    <div class="preview-item">
      <h3>启动画面</h3>
      <svg width="256" height="256" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="1024" height="1024" rx="204.8" fill="#FAF5F0"/>
        <circle cx="420" cy="512" r="280" fill="#2D5A7B"/>
        <circle cx="640" cy="560" r="160" fill="#E8A87C"/>
        <circle cx="420" cy="380" r="90" fill="#FAF5F0"/>
        <circle cx="640" cy="470" r="60" fill="#FAF5F0"/>
        <path d="M512 680 Q512 720 540 740 Q568 720 568 680 Q568 640 540 660 Q512 640 512 680" fill="#5BA3C6" opacity="0.6"/>
        <path d="M700 340 L710 360 L730 365 L715 380 L720 400 L700 390 L680 400 L685 380 L670 365 L690 360 Z" fill="#E8A87C" opacity="0.8"/>
      </svg>
      <span class="size-tag">1024 × 1024</span>
    </div>

  </div>

  <div style="text-align: center; margin-top: 60px; padding: 30px; background: white; border-radius: 20px; max-width: 600px; margin-left: auto; margin-right: auto;">
    <h3 style="color: #2D5A7B; margin-bottom: 20px;">🎨 配色方案</h3>
    <div class="color-palette">
      <div>
        <div class="color-swatch" style="background: #2D5A7B;"></div>
        <p style="font-size: 12px; color: #666; margin-top: 8px;">主色<br>#2D5A7B</p>
      </div>
      <div>
        <div class="color-swatch" style="background: #E8A87C;"></div>
        <p style="font-size: 12px; color: #666; margin-top: 8px;">暖橙<br>#E8A87C</p>
      </div>
      <div>
        <div class="color-swatch" style="background: #5BA3C6;"></div>
        <p style="font-size: 12px; color: #666; margin-top: 8px;">浅蓝<br>#5BA3C6</p>
      </div>
      <div>
        <div class="color-swatch" style="background: #FAF5F0; border: 1px solid #ddd;"></div>
        <p style="font-size: 12px; color: #666; margin-top: 8px;">背景<br>#FAF5F0</p>
      </div>
    </div>
  </div>

  <div style="text-align: center; margin-top: 40px; color: #666; font-size: 14px;">
    <p><strong>设计理念：</strong>父与子的温暖联结</p>
    <p style="margin-top: 12px;">
      <span style="background: #E8F4F8; padding: 8px 16px; border-radius: 8px;">
        🤱 大圆（爸爸） + 👶 小圆（孩子） = 守护与陪伴
      </span>
    </p>
    <p style="margin-top: 20px; color: #888; font-size: 12px;">
      文件路径：what-dad-do-vibe/assets/icon.svg
    </p>
  </div>

</body>
</html>
